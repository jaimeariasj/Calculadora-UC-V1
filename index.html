<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora UC — Cloud T</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efe9;--border:#dddcd6;--border2:#c8c7bf;
    --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;
    --accent:#1a3a5c;--accent-light:#e8eef5;--accent-mid:#3d6b9e;
    --green:#2d6a4f;--green-light:#e8f5ee;--amber:#7c5200;--amber-light:#fff3dc;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
    --radius:6px;--radius-lg:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
  header{background:var(--accent);color:#fff;padding:18px 32px;display:flex;align-items:baseline;gap:16px;}
  header h1{font-size:18px;font-weight:600;letter-spacing:-0.02em;}
  header span{font-size:12px;opacity:0.6;font-family:var(--mono);}
  .layout{display:grid;grid-template-columns:370px 1fr;min-height:calc(100vh - 58px);}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px 18px;overflow-y:auto;}
  .main{padding:24px 28px;overflow-y:auto;}
  .block{margin-bottom:20px;}
  .block-title{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
  .field label{font-size:11px;color:var(--text2);font-weight:500;}
  .field input,.field select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color 0.15s;}
  .field input:focus,.field select:focus{border-color:var(--accent-mid);}
  .field input.objetivo{border-color:var(--accent-mid);background:var(--accent-light);}
  .config-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .product-card{border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;cursor:pointer;transition:all 0.12s;background:var(--surface);}
  .product-card:hover{border-color:var(--border2);background:var(--surface2);}
  .product-card.selected{border-color:var(--accent-mid);background:var(--accent-light);}
  .prod-name{font-size:12px;font-weight:600;margin-bottom:2px;}
  .prod-tag{font-size:10px;color:var(--text3);line-height:1.3;}
  .prod-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
  .badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;letter-spacing:0.03em;}
  .badge-amber{background:var(--amber-light);color:var(--amber);}
  .badge-green{background:var(--green-light);color:var(--green);}
  .qty-block{padding:10px 0;border-bottom:1px solid var(--border);}
  .qty-block:last-child{border-bottom:none;}
  .qty-row{display:flex;align-items:center;gap:8px;}
  .qty-lbl{flex:1;font-size:12px;font-weight:500;}
  .qty-hint{font-size:10px;color:var(--accent-mid);font-family:var(--mono);margin-top:3px;line-height:1.4;}
  .qty-row input[type=number]{width:88px;padding:5px 8px;text-align:right;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:13px;outline:none;}
  .qty-row input:focus{border-color:var(--accent-mid);}
  .qty-row select{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
  .sub-inputs{margin-top:8px;padding-left:12px;border-left:2px solid var(--border2);display:flex;flex-direction:column;gap:6px;}
  .sub-row{display:flex;align-items:center;gap:8px;}
  .sub-row label{font-size:11px;color:var(--text2);flex:1;}
  .sub-row input{width:88px;padding:4px 8px;text-align:right;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-family:var(--mono);font-size:12px;color:var(--text);outline:none;}
  .sub-row select{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);font-family:var(--sans);font-size:12px;color:var(--text);outline:none;min-width:160px;}
  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;}
  .metric.obj{border-color:var(--accent-mid);background:var(--accent-light);}
  .metric .mlabel{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
  .metric .mval{font-size:18px;font-weight:600;font-family:var(--mono);letter-spacing:-0.02em;}
  .metric.obj .mval{color:var(--accent);}
  table.fin{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.fin th{text-align:left;padding:6px 10px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);}
  table.fin th.obj{color:var(--accent);}
  table.fin td{padding:5px 10px;border-bottom:1px solid var(--border);}
  table.fin tr:last-child td{border-bottom:none;}
  table.fin .num{text-align:right;font-family:var(--mono);}
  table.fin .obj-col{text-align:right;font-family:var(--mono);color:var(--accent-mid);}
  table.fin .sub-row-tr td{background:var(--surface2);font-weight:600;}
  table.fin .bold-tr td{font-weight:600;}
  table.fin .sec-tr td{background:var(--bg);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);padding:5px 10px;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:var(--text3);text-align:center;gap:10px;}
  .empty-state .icon{font-size:36px;opacity:0.3;}
  .empty-state p{font-size:13px;max-width:260px;line-height:1.6;}
  .fin-section-title{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:0;}
  @media(max-width:800px){.layout{grid-template-columns:1fr;}.sidebar{border-right:none;border-bottom:1px solid var(--border);}}
</style>
</head>
<body>
<header>
  <h1>Calculadora UC — Cloud T</h1>
  <span>Servicios Digitales · v1.0</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="block">
      <div class="block-title">Parámetros generales</div>
      <div class="config-grid">
        <div class="field"><label>TRM (USD → COP)</label>
          <input type="number" id="trm" value="3800" min="1000" max="12000" step="50" onchange="recalc()"></div>
        <div class="field"><label>Descuento adicional (%)</label>
          <input type="number" id="descuento" value="0" min="0" max="40" step="0.5" onchange="recalc()"></div>
        <div class="field"><label>Vigencia</label>
          <select id="vigencia" onchange="recalc()">
            <option value="12">1 año</option>
            <option value="24">2 años</option>
            <option value="36">3 años</option>
          </select></div>
        <div class="field"><label>MRC objetivo (opcional)</label>
          <input type="number" class="objetivo" id="mrc_obj" placeholder="Ej: 2000000" min="0" onchange="recalc()"></div>
      </div>
    </div>
    <div class="block">
      <div class="block-title">Portafolio — selección múltiple</div>
      <div class="product-grid" id="product-grid"></div>
    </div>
    <div class="block" id="config-section" style="display:none">
      <div class="block-title">Cantidades y configuración</div>
      <div id="qty-rows"></div>
    </div>
  </div>
  <div class="main">
    <div class="empty-state" id="empty-state">
      <div class="icon">◈</div>
      <p>Selecciona uno o más productos del portafolio para calcular la tarifa.</p>
    </div>
    <div id="results-content" style="display:none"></div>
  </div>
</div>
<script>
const fmt=v=>(isNaN(v)||!isFinite(v))?'-':Math.round(v).toLocaleString('es-CO');
const fmtPct=v=>(isNaN(v)||!isFinite(v))?'-':(v*100).toFixed(2)+'%';
const CIUDADES={'Barranquilla':{base:50000,didAd:35000,canAd:34000},'Bogotá':{base:30000,didAd:15000,canAd:34000},'Bucaramanga':{base:30000,didAd:15000,canAd:34000},'Cali':{base:30000,didAd:15000,canAd:34000},'Cartagena':{base:48000,didAd:33000,canAd:34000},'Cúcuta':{base:30000,didAd:15000,canAd:34000},'Ibagué':{base:30000,didAd:15000,canAd:34000},'Manizales':{base:30000,didAd:15000,canAd:34000},'Medellín':{base:58000,didAd:43000,canAd:34000},'Neiva':{base:30000,didAd:15000,canAd:34000},'Pasto':{base:30000,didAd:15000,canAd:34000},'Pereira':{base:30000,didAd:15000,canAd:34000},'Santa Marta':{base:30000,didAd:15000,canAd:34000},'Tunja':{base:30000,didAd:15000,canAd:34000},'Soacha/Bogotá':{base:38000,didAd:23000,canAd:34000},'Villavicencio':{base:30000,didAd:15000,canAd:34000}};
const OMNI_SETUP=[{min:3,max:10,setup:1600000,label:'3-10'},{min:11,max:50,setup:2500000,label:'11-50'},{min:51,max:100,setup:4200000,label:'51-100'},{min:101,max:9999,setup:6300000,label:'101+'}];
const PRODUCTS=[
  {id:'chat',name:'Chat Center',tag:'Cloud T · COP/agente/mes',moneda:'COP',type:'cloud',campo:'agentes',setupFijo:800000,rangos:[{min:3,max:5,costo:123000,label:'3-5'},{min:6,max:10,costo:104000,label:'6-10'},{min:11,max:20,costo:90500,label:'11-20'},{min:21,max:30,costo:80500,label:'21-30'},{min:31,max:40,costo:73400,label:'31-40'},{min:41,max:9999,costo:68200,label:'41+'}]},
  {id:'omni',name:'Omnicanalidad',tag:'Cloud T · COP/agente/mes',moneda:'COP',type:'cloud',campo:'agentes',setupRangos:OMNI_SETUP,rangos:[{min:3,max:10,costo:249000,label:'3-10'},{min:11,max:50,costo:211000,label:'11-50'},{min:51,max:100,costo:187000,label:'51-100'},{min:101,max:9999,costo:165000,label:'101+'}]},
  {id:'wap',name:'WhatsApp Entrante',tag:'Cloud T · USD/canal/mes',moneda:'USD',type:'cloud',costo:100,campo:'canales'},
  {id:'sip_movil',name:'Troncal SIP Móvil',tag:'Cloud T · COP/mes',moneda:'COP',type:'cloud',esSIPMovil:true,sesiones:[{min:1,max:9,costo:34000,label:'1-9'},{min:10,max:29,costo:32000,label:'10-29'},{min:30,max:9999,costo:30000,label:'30+'}]},
  {id:'sip_fija',name:'Troncal SIP Fija',tag:'Cloud T · COP/mes · por ciudad',moneda:'COP',type:'cloud',esSIPFija:true},
  {id:'devhora',name:'Hora Desarrollo',tag:'Venta · COP/hora',moneda:'COP',type:'venta_unica',costo:215000,campo:'horas'},
  {id:'wapout_mkt',name:'MSG OUT Marketing',tag:'Venta · USD/msg/mes',moneda:'USD',type:'venta_recur',costo:0.0237,campo:'msgs/mes'},
  {id:'wapout_auth',name:'MSG OUT Auth/Util',tag:'Venta · USD/msg/mes',moneda:'USD',type:'venta_recur',costo:0.012,campo:'msgs/mes'},
  {id:'ia_txt',name:'IA Texto (5.000 int.)',tag:'Venta · USD/paq/mes',moneda:'USD',type:'venta_recur',costo:50,campo:'paq/mes'},
  {id:'ia_add',name:'IA Texto Paq Adicional',tag:'Venta · USD/paq/mes',moneda:'USD',type:'venta_recur',costo:10,campo:'paq/mes'},
];
const selected=new Set();
const state={};
PRODUCTS.forEach(p=>{state[p.id]=0;});
state['sip_movil_dids']=0;state['sip_movil_ses']=0;state['sip_movil_min']=0;
state['sip_fija_ciudad']='Bogotá';state['sip_fija_dids']=0;state['sip_fija_can']=0;state['sip_fija_min']=0;
function getRango(rangos,qty){return rangos.find(r=>qty>=r.min&&qty<=r.max)||rangos[rangos.length-1];}
function costoSIPMovil(){const dAd=state['sip_movil_dids'],sAd=state['sip_movil_ses'],min=state['sip_movil_min'];let c=49000+dAd*15000;if(sAd>0){const r=getRango(PRODUCTS.find(p=>p.id==='sip_movil').sesiones,sAd);c+=r.costo*sAd;}return c+min*50;}
function costoSIPFija(){const c=CIUDADES[state['sip_fija_ciudad']]||CIUDADES['Bogotá'];return c.base+state['sip_fija_dids']*c.didAd+state['sip_fija_can']*c.canAd+state['sip_fija_min']*50;}
function calcPrecioPublico(costo,descPct){return costo*1.015/(1-0.25198)/(1-0.16)*(1-descPct/100);}
function getFinancials(costoBase,mrcUsado){const costoConImp=costoBase*1.015;const costosPct=mrcUsado>0?costoConImp/mrcUsado:0;const utilBruta=1-costosPct;const imp=0.01198,gastos=0.045,mc=utilBruta-imp-gastos;const carga=0.01365,com=0.035,ebit=mc-carga-com;return{costoConImp,costosPct,utilBruta,imp,gastos,mc,carga,com,ebit};}
function updateSubLabels(){
  const elM=document.getElementById('sub_sip_movil');
  if(elM){const dAd=state['sip_movil_dids'],sAd=state['sip_movil_ses'],min=state['sip_movil_min'];let p=['Base $49.000 (1 DID + 3 ses.)'];if(dAd>0)p.push(dAd+' DID ad. × $15.000');if(sAd>0){const r=getRango(PRODUCTS.find(x=>x.id==='sip_movil').sesiones,sAd);p.push(sAd+' ses. ad. × $'+fmt(r.costo)+' ['+r.label+']');}if(min>0)p.push(fmt(min)+' min × $50');elM.textContent=p.join(' + ')+' → $'+fmt(costoSIPMovil())+'/mes';}
  const elF=document.getElementById('sub_sip_fija');
  if(elF){const c=CIUDADES[state['sip_fija_ciudad']]||CIUDADES['Bogotá'];const dAd=state['sip_fija_dids'],cAd=state['sip_fija_can'],min=state['sip_fija_min'];let p=['Base $'+fmt(c.base)+' (1 DID + 2 can.)'];if(dAd>0)p.push(dAd+' DID ad. × $'+fmt(c.didAd));if(cAd>0)p.push(cAd+' can. ad. × $'+fmt(c.canAd));if(min>0)p.push(fmt(min)+' min × $50');elF.textContent=p.join(' + ')+' → $'+fmt(costoSIPFija())+'/mes';}
  PRODUCTS.filter(p=>selected.has(p.id)&&p.rangos).forEach(p=>{const el=document.getElementById('sub_'+p.id);if(!el)return;const q=state[p.id],r=getRango(p.rangos,q);let txt='$'+fmt(r.costo)+' '+p.moneda+'/'+p.campo+' · rango '+r.label;if(p.setupFijo)txt+=' · setup fijo $'+fmt(p.setupFijo);if(p.setupRangos){const rs=getRango(p.setupRangos,q);txt+=' · setup $'+fmt(rs.setup)+' ['+rs.label+']';}el.textContent=txt;});
}
function renderProducts(){document.getElementById('product-grid').innerHTML=PRODUCTS.map(p=>'<div class="product-card'+(selected.has(p.id)?' selected':'')+'" onclick="toggleProduct(\''+p.id+'\')"><div class="prod-name">'+p.name+'</div><div class="prod-tag">'+p.tag+'</div><div class="prod-badges">'+(p.type==='venta_unica'?'<span class="badge badge-amber">Pago único</span>':'')+(p.setupFijo||p.setupRangos?'<span class="badge badge-green">Setup incluido</span>':'')+'</div></div>').join('');}
function toggleProduct(id){if(selected.has(id))selected.delete(id);else selected.add(id);renderProducts();renderQtyRows();recalc();}
const ciudadOptions=Object.keys(CIUDADES).map(c=>'<option value="'+c+'">'+c+'</option>').join('');
function renderQtyRows(){
  const prods=PRODUCTS.filter(p=>selected.has(p.id));
  const sec=document.getElementById('config-section');
  if(!prods.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('qty-rows').innerHTML=prods.map(p=>{
    if(p.esSIPMovil)return '<div class="qty-block"><div class="qty-row"><div class="qty-lbl">Troncal SIP Móvil<div class="qty-hint" id="sub_sip_movil">Base $49.000 → $'+fmt(costoSIPMovil())+'/mes</div></div></div><div class="sub-inputs"><div class="sub-row"><label>DIDs adicionales</label><input type="number" value="'+state['sip_movil_dids']+'" min="0" onchange="state[\'sip_movil_dids\']=parseInt(this.value)||0;updateSubLabels();recalc()"></div><div class="sub-row"><label>Sesiones adicionales (sobre 3 base)</label><input type="number" value="'+state['sip_movil_ses']+'" min="0" onchange="state[\'sip_movil_ses\']=parseInt(this.value)||0;updateSubLabels();recalc()"></div><div class="sub-row"><label>Minutos salientes est./mes</label><input type="number" value="'+state['sip_movil_min']+'" min="0" onchange="state[\'sip_movil_min\']=parseInt(this.value)||0;updateSubLabels();recalc()"></div></div></div>';
    if(p.esSIPFija)return '<div class="qty-block"><div class="qty-row"><div class="qty-lbl">Troncal SIP Fija<div class="qty-hint" id="sub_sip_fija">Base $30.000 → $'+fmt(costoSIPFija())+'/mes</div></div></div><div class="sub-inputs"><div class="sub-row"><label>Ciudad</label><select onchange="state[\'sip_fija_ciudad\']=this.value;updateSubLabels();recalc()">'+ciudadOptions.replace('value="'+state['sip_fija_ciudad']+'"','value="'+state['sip_fija_ciudad']+'" selected')+'</select></div><div class="sub-row"><label>DIDs adicionales</label><input type="number" value="'+state['sip_fija_dids']+'" min="0" onchange="state[\'sip_fija_dids\']=parseInt(this.value)||0;updateSubLabels();recalc()"></div><div class="sub-row"><label>Canales adicionales (sobre 2 base)</label><input type="number" value="'+state['sip_fija_can']+'" min="0" onchange="state[\'sip_fija_can\']=parseInt(this.value)||0;updateSubLabels();recalc()"></div><div class="sub-row"><label>Minutos salientes est./mes</label><input type="number" value="'+state['sip_fija_min']+'" min="0" onchange="state[\'sip_fija_min\']=parseInt(this.value)||0;updateSubLabels();recalc()"></div></div></div>';
    if(p.rangos){const q=state[p.id],r=getRango(p.rangos,q);let sub='$'+fmt(r.costo)+' '+p.moneda+'/'+p.campo+' · rango '+r.label;if(p.setupFijo)sub+=' · setup $'+fmt(p.setupFijo);if(p.setupRangos){const rs=getRango(p.setupRangos,q);sub+=' · setup $'+fmt(rs.setup)+' ['+rs.label+']';}return '<div class="qty-block"><div class="qty-row"><div class="qty-lbl">'+p.name+'<div class="qty-hint" id="sub_'+p.id+'">'+sub+'</div></div><input type="number" value="'+state[p.id]+'" min="0" onchange="state[\''+p.id+'\']=parseFloat(this.value)||0;updateSubLabels();recalc()"></div></div>';}
    const q=state[p.id];return '<div class="qty-block"><div class="qty-row"><div class="qty-lbl">'+p.name+'<div class="qty-hint">'+(p.moneda==='USD'?'USD '+p.costo+'/'+p.campo:'COP '+fmt(p.costo)+'/'+p.campo)+'</div></div><input type="number" value="'+q+'" min="0" onchange="state[\''+p.id+'\']=parseFloat(this.value)||0;recalc()"></div></div>';
  }).join('');
}
function buildRows(costoBase,mrc,nrc,fNRC,setupChat,setupOmni,costoUnico){
  const f=getFinancials(costoBase,mrc);const rows=[];
  rows.push({sec:'Recurrente mensual (MRC)'});
  rows.push({l:'Precio público (MRC)',pct:null,cop:mrc,cls:'sub-row-tr'});
  rows.push({l:'Costos (incl. imprevistos 1.5%)',pct:f.costosPct,cop:f.costoConImp});
  rows.push({l:'Utilidad bruta',pct:f.utilBruta,cop:mrc-f.costoConImp});
  rows.push({l:'Impuestos CRC+ICA (1.198%)',pct:f.imp,cop:mrc*f.imp});
  rows.push({l:'Gastos operacionales (4.5%)',pct:f.gastos,cop:mrc*f.gastos});
  rows.push({l:'Margen contribucional',pct:f.mc,cop:mrc*f.mc,cls:'bold-tr'});
  rows.push({l:'Carga prestacional comisión (1.365%)',pct:f.carga,cop:mrc*f.carga});
  rows.push({l:'Comisión (3.5%)',pct:f.com,cop:mrc*f.com});
  rows.push({l:'Utilidad EBIT',pct:f.ebit,cop:mrc*f.ebit,cls:'bold-tr'});
  rows.push({l:'EBIT / Costo',pct:f.costosPct>0?f.ebit/f.costosPct:null,cop:null});
  if(fNRC){const d=[];if(setupChat>0)d.push('Setup Chat $'+fmt(setupChat));if(setupOmni>0)d.push('Setup Omni $'+fmt(setupOmni));if(costoUnico>0)d.push('Otros $'+fmt(costoUnico));rows.push({sec:'Pago único (NRC) — '+d.join(' · ')});rows.push({l:'Precio público (NRC)',pct:null,cop:nrc,cls:'sub-row-tr'});rows.push({l:'Costos (incl. imprevistos 1.5%)',pct:fNRC.costosPct,cop:fNRC.costoConImp});rows.push({l:'Utilidad bruta',pct:fNRC.utilBruta,cop:nrc-fNRC.costoConImp});rows.push({l:'Impuestos CRC+ICA (1.198%)',pct:fNRC.imp,cop:nrc*fNRC.imp});rows.push({l:'Gastos operacionales (4.5%)',pct:fNRC.gastos,cop:nrc*fNRC.gastos});rows.push({l:'Margen contribucional',pct:fNRC.mc,cop:nrc*fNRC.mc,cls:'bold-tr'});rows.push({l:'Carga prestacional comisión (1.365%)',pct:fNRC.carga,cop:nrc*fNRC.carga});rows.push({l:'Comisión (3.5%)',pct:fNRC.com,cop:nrc*fNRC.com});rows.push({l:'Utilidad EBIT',pct:fNRC.ebit,cop:nrc*fNRC.ebit,cls:'bold-tr'});rows.push({l:'EBIT / Costo',pct:fNRC.costosPct>0?fNRC.ebit/fNRC.costosPct:null,cop:null});}
  return rows;
}
function recalc(){
  const trm=parseFloat(document.getElementById('trm').value)||3800;
  const descPct=parseFloat(document.getElementById('descuento').value)||0;
  const vigMeses=parseInt(document.getElementById('vigencia').value)||12;
  const mrcObjRaw=parseFloat(document.getElementById('mrc_obj').value);
  const mrcObj=(!isNaN(mrcObjRaw)&&mrcObjRaw>0)?mrcObjRaw:null;
  const prods=PRODUCTS.filter(p=>selected.has(p.id));
  const empty=document.getElementById('empty-state');
  const res=document.getElementById('results-content');
  if(!prods.length){empty.style.display='flex';res.style.display='none';return;}
  empty.style.display='none';res.style.display='block';
  let costoMensual=0,costoUnico=0,setupChat=0,setupOmni=0;
  prods.forEach(p=>{let l=0;if(p.esSIPMovil)l=costoSIPMovil();else if(p.esSIPFija)l=costoSIPFija();else if(p.rangos){const q=state[p.id],r=getRango(p.rangos,q);l=(p.moneda==='USD'?r.costo*trm:r.costo)*q;if(p.id==='chat'&&p.setupFijo)setupChat=p.setupFijo;if(p.id==='omni'&&p.setupRangos)setupOmni=getRango(p.setupRangos,state[p.id]).setup;}else{const q=state[p.id];l=(p.moneda==='USD'?p.costo*trm:p.costo)*q;}if(p.type==='cloud'||p.type==='venta_recur')costoMensual+=l;else costoUnico+=l;});
  const costoNRC=setupChat+setupOmni+costoUnico;
  const mrcCalc=calcPrecioPublico(costoMensual,descPct);
  const nrcCalc=costoNRC>0?calcPrecioPublico(costoNRC,descPct):0;
  const fNRCCalc=costoNRC>0?getFinancials(costoNRC,nrcCalc):null;
  const fcvCalc=mrcCalc*vigMeses+nrcCalc;
  const fcvObj=mrcObj?(mrcObj*vigMeses+nrcCalc):null;
  const hasObj=!!mrcObj;
  let mHTML='<div class="metric"><div class="mlabel">NRC</div><div class="mval">$'+fmt(nrcCalc)+'</div></div><div class="metric"><div class="mlabel">MRC calculado</div><div class="mval">$'+fmt(mrcCalc)+'</div></div><div class="metric"><div class="mlabel">FCV '+(vigMeses/12)+' año(s)</div><div class="mval">$'+fmt(fcvCalc)+'</div></div><div class="metric"><div class="mlabel">EBIT MRC calc.</div><div class="mval">'+fmtPct(getFinancials(costoMensual,mrcCalc).ebit)+'</div></div>';
  if(hasObj)mHTML+='<div class="metric obj"><div class="mlabel">MRC objetivo</div><div class="mval">$'+fmt(mrcObj)+'</div></div><div class="metric obj"><div class="mlabel">FCV con objetivo</div><div class="mval">$'+fmt(fcvObj)+'</div></div><div class="metric obj"><div class="mlabel">EBIT MRC objetivo</div><div class="mval">'+fmtPct(getFinancials(costoMensual,mrcObj).ebit)+'</div></div>';
  const rowsC=buildRows(costoMensual,mrcCalc,nrcCalc,fNRCCalc,setupChat,setupOmni,costoUnico);
  const rowsO=hasObj?buildRows(costoMensual,mrcObj,nrcCalc,fNRCCalc,setupChat,setupOmni,costoUnico):[];
  const thead='<tr><th>Concepto</th><th class="num">%</th><th class="num">COP calc.</th>'+(hasObj?'<th class="num obj">% objetivo</th><th class="num obj">COP objetivo</th>':'')+'</tr>';
  const tbody=rowsC.map((r,i)=>{const o=rowsO[i];if(r.sec)return '<tr class="sec-tr"><td colspan="'+(hasObj?5:3)+'">'+r.sec+'</td></tr>';return '<tr class="'+(r.cls||'')+'"><td>'+r.l+'</td><td class="num">'+(r.pct!=null?fmtPct(r.pct):'-')+'</td><td class="num">'+(r.cop!=null?'$'+fmt(r.cop):'-')+'</td>'+(hasObj?'<td class="obj-col">'+(o&&o.pct!=null?fmtPct(o.pct):'-')+'</td><td class="obj-col">'+(o&&o.cop!=null?'$'+fmt(o.cop):'-')+'</td>':'')+'</tr>';}).join('');
  res.innerHTML='<div class="metrics-grid">'+mHTML+'</div><div class="fin-section-title">Variables financieras</div><table class="fin"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
}
renderProducts();
</script>
